<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الدمج الاحترافية - Merge Game Pro</title>
<style>
  body { font-family: Arial, sans-serif; text-align:center; background:#f0f0f0; }
  #game { margin-top:20px; }
  .element { display:inline-block; width:60px; height:60px; line-height:60px; margin:5px; font-size:18px; border-radius:8px; background:#fff; cursor:pointer; user-select:none; }
  #balance { margin-top:10px; }
  #messages { margin-top:15px; font-weight:bold; }
  #login { margin-top:20px; }
</style>
</head>
<body>

<h1>لعبة الدمج الاحترافية - Merge Game Pro</h1>

<div id="login">
  <input type="text" id="email" placeholder="أدخل بريدك أو اسمك (guest)">
  <button onclick="login()">دخول</button>
</div>

<div id="game" style="display:none;">
  <div id="elements"></div>
  <div id="balance"></div>
  <div id="messages"></div>
</div>

<script>
const SERVER_URL = "https://gems-system.onrender.com";
let player = { id:null, gems:0, points:0, da:0 };
const items = ["🍎","🍌","🍇","🥝","🥕","🥒","🌽","🍆"];

function login(){
    let email = document.getElementById("email").value;
    let guestId = "guest_"+Math.floor(Math.random()*100000);
    fetch(SERVER_URL+"/api/login",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ email: email || null, guestId: email?null:guestId })
    }).then(r=>r.json())
    .then(data=>{
        player = data;
        document.getElementById("login").style.display="none";
        document.getElementById("game").style.display="block";
        generateElements();
        updateBalance();
    });
}

function generateElements(){
    const container = document.getElementById("elements");
    container.innerHTML="";
    for(let i=0;i<4;i++){
        let idx = Math.floor(Math.random()*items.length);
        let el = document.createElement("div");
        el.className="element";
        el.innerText = items[idx];
        el.onclick = ()=>mergeElement(i, idx);
        container.appendChild(el);
    }
}

let first = null;
function mergeElement(index, idx){
    if(first===null){ first={index, idx}; return; }
    fetch(SERVER_URL+"/api/merge",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ id:player.id, el1:first.idx, el2:idx })
    }).then(r=>r.json())
    .then(data=>{
        document.getElementById("messages").innerText = data.message;
        player.gems = data.gems;
        player.points = data.points;
        player.da = data.da;
        updateBalance();
        generateElements();
        first = null;
    });
}

function updateBalance(){
    document.getElementById("balance").innerText = 
      `Gems: ${player.gems} | Points: ${player.points} | DA: ${player.da}`;
}
</script>

</body>
</html>
